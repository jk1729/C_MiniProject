
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Attendance Manager System</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1d2671,#c33764);
color:white;
text-align:center;
}

header{
font-size:32px;
padding:25px;
font-weight:bold;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
width:90%;
max-width:1000px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:10px;
}

.console{
width:90%;
max-width:1000px;
margin:30px auto;
}

textarea{
width:100%;
height:300px;
background:black;
color:#00ff9d;
padding:15px;
border-radius:10px;
font-family:monospace;
}

.input-area{
margin-top:15px;
}

input{
padding:10px;
width:200px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
border:none;
border-radius:5px;
background:#00c6ff;
color:white;
cursor:pointer;
}

button:hover{
background:#0096c7;
}

</style>

</head>

<body>

<header>
Attendance Manager System
</header>

<div class="dashboard">

<div class="card">Add Student</div>
<div class="card">Mark Attendance</div>
<div class="card">Display Students</div>
<div class="card">Attendance Shortage</div>
<div class="card">Class Report</div>

</div>

<div class="console">

<h2>C Program Output</h2>

<textarea id="output" readonly></textarea>

<div class="input-area">

<input id="inputBox" placeholder="Enter input">
<button onclick="sendInput()">Send</button>

</div>

</div>

<script>

var inputBuffer = [];

function sendInput()
{
let value=document.getElementById("inputBox").value+"\n";

for(let i=0;i<value.length;i++)
{
inputBuffer.push(value.charCodeAt(i));
}

document.getElementById("inputBox").value="";
}

var Module = {

print:function(text)
{
let output=document.getElementById("output");
output.value += text + "\n";
output.scrollTop = output.scrollHeight;
},

stdin:function()
{
if(inputBuffer.length==0)
return null;

return inputBuffer.shift();
}

};

</script>

<script src="index.js"></script>

</body>

</html>
