```html
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Attendance Manager Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
text-align:center;
}

header{
font-size:32px;
font-weight:600;
padding:25px;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:40px;
max-width:1000px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:12px;
backdrop-filter:blur(8px);
box-shadow:0 6px 20px rgba(0,0,0,0.3);
}

.card h3{
margin-bottom:10px;
}

.card p{
font-size:14px;
opacity:0.9;
}

#output{
width:90%;
height:300px;
margin:30px auto;
display:block;
background:black;
color:#00ff9d;
padding:15px;
border-radius:10px;
font-family:monospace;
}

.spinner{
height:30px;
width:30px;
border:5px solid #ddd;
border-top:5px solid #00c6ff;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
display:none;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

canvas{
display:none;
}

</style>

</head>

<body>

<header>
Attendance Manager System
</header>

<div class="dashboard">

<div class="card">
<h3>Add Student</h3>
<p>Add new students to the system.</p>
</div>

<div class="card">
<h3>Mark Attendance</h3>
<p>Record daily attendance.</p>
</div>
```
